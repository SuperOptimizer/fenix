# RTX 5090 (32 GB) — measured 2026-06-30 + 2026-07-03 on RunPod (Ubuntu 24.04, torch 2.8.0+cu128).
# batch=3 + producer/consumer pipelining was the win; channels_last and cuDNN autotune were not.
# Fleet benchmark (2026-07-03, 768³ 125-tile reference job, community pod $0.69/hr):
#   eager fp16 b3 42.1s | b1 56.1s | TRT .plan b3 27.1s (1.55x — engine gain reproduces).
#   vs RTX PRO 6000 ($1.69): eager 24.6s / TRT 14.9s → 5090+TRT = 0.52¢/job, the fleet
#   winner (1.35x cheaper than PRO+TRT, ~matches PRO eager wall-clock). Teacher-sweep
#   playbook: N community 5090 pods, install-runpod-ubuntu2404.sh, build_engine.py once
#   (~70s; exports trace on GPU — CPU fp16 trace took 37min on a slow-clock host), then
#   resumable predict. Uplink VARIES per host: 7 MB/s (06-30 pod) vs ~110 MB/s (07-03).
[predict]
batch = 3
patch = 256
overlap = 0.5
[notes]
vram_gb = 32
ingest_sustained_mbps = 110  # 07-03 pod; the 06-30 pod was capped at 7 — check per host
